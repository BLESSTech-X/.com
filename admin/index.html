<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLESSTech-X Admin</title>
  <link rel="icon" type="image/jpeg" href="https://i.ibb.co/zTWvRVB1/Copilot-20251230-144351.jpg" />
  <style>body { margin: 0; font-family: sans-serif; background: #0f172a; }</style>
</head>
<body>

<script>window.CMS_MANUAL_INIT = true;</script>
<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

<script>
CMS.init({
  config: {
    backend: {
      name: 'github',
      repo: 'BLESSTech-X/.com',
      branch: 'main',
      base_url: 'https://api.netlify.com',
      auth_endpoint: 'auth'
    },
    media_folder: 'images/uploads',
    public_folder: '/images/uploads',

    collections: [

      // ════════════════════════════════════════════════
      // COLLECTION 1 — SITE SETTINGS
      // Edits: site.name, site.tagline, site.phone,
      //        site.email, site.whatsapp, site.location,
      //        site.logo, site.og_image, site.socials,
      //        site.formspree_id, site.description
      // ════════════════════════════════════════════════
      {
        name: 'site_settings',
        label: '⚙️ Site Settings',
        files: [
          {
            name: 'site',
            label: 'Site Info & Contact',
            file: 'data.json',
            fields: [
              {
                label: 'Site', name: 'site', widget: 'object',
                fields: [
                  { label: 'Site Name',              name: 'name',         widget: 'string' },
                  { label: 'Tagline',                name: 'tagline',      widget: 'string' },
                  { label: 'Description',            name: 'description',  widget: 'text'   },
                  { label: 'Phone (with +)',          name: 'phone',        widget: 'string' },
                  { label: 'Email',                  name: 'email',        widget: 'string' },
                  { label: 'WhatsApp (digits only)', name: 'whatsapp',     widget: 'string', hint: 'e.g. 260979603741 — no + or spaces' },
                  { label: 'Location',               name: 'location',     widget: 'string' },
                  { label: 'Logo URL',               name: 'logo',         widget: 'string' },
                  { label: 'Share/OG Image URL',     name: 'og_image',     widget: 'string', hint: 'Image shown when link is shared on WhatsApp/Facebook' },
                  { label: 'Formspree ID',           name: 'formspree_id', widget: 'string', hint: 'From formspree.io — your contact form ID' },
                  {
                    label: 'Social Media', name: 'socials', widget: 'object',
                    fields: [
                      { label: 'Facebook URL',  name: 'facebook',  widget: 'string', required: false },
                      { label: 'Instagram URL', name: 'instagram', widget: 'string', required: false },
                      { label: 'TikTok URL',    name: 'tiktok',    widget: 'string', required: false },
                      { label: 'Twitter/X URL', name: 'twitter',   widget: 'string', required: false },
                      { label: 'YouTube URL',   name: 'youtube',   widget: 'string', required: false }
                    ]
                  }
                ]
              }
            ]
          },

          // ── ANNOUNCEMENT BAR ──────────────────────────
          {
            name: 'announcement',
            label: 'Announcement Bar',
            file: 'data.json',
            fields: [
              {
                label: 'Announcement', name: 'announcement', widget: 'object',
                fields: [
                  { label: 'Show Bar (on/off)', name: 'active',   widget: 'boolean', default: true },
                  { label: 'Message Text',      name: 'message',  widget: 'string',  hint: 'HTML allowed — e.g. <strong>30% OFF</strong>' },
                  { label: 'Button Text',       name: 'cta_text', widget: 'string' },
                  { label: 'Button Link',       name: 'cta_link', widget: 'string', hint: 'e.g. #contact or https://...' }
                ]
              }
            ]
          },

          // ── STATS BAR ─────────────────────────────────
          {
            name: 'stats',
            label: 'Stats Bar (Numbers)',
            file: 'data.json',
            fields: [
              {
                label: 'Stats', name: 'stats', widget: 'list',
                hint: 'The 4 numbers shown in the dark bar below the hero',
                fields: [
                  { label: 'Value (e.g. 150+)', name: 'value', widget: 'string' },
                  { label: 'Label (e.g. Businesses Transformed)', name: 'label', widget: 'string' }
                ]
              }
            ]
          }
        ]
      },

      // ════════════════════════════════════════════════
      // COLLECTION 2 — SERVICES
      // Edits: services[] array
      // ════════════════════════════════════════════════
      {
        name: 'services',
        label: '🛠️ Services',
        files: [
          {
            name: 'services_list',
            label: 'All Services',
            file: 'data.json',
            fields: [
              {
                label: 'Services', name: 'services', widget: 'list',
                hint: 'Add, edit or delete services. Changes go live on your website automatically.',
                fields: [
                  { label: 'ID (unique, no spaces)',      name: 'id',          widget: 'string', hint: 'e.g. ecommerce-store — must be unique, no spaces' },
                  { label: 'Service Title',               name: 'title',       widget: 'string' },
                  {
                    label: 'Category', name: 'category', widget: 'select',
                    options: [
                      { label: 'E-commerce',  value: 'ecommerce'  },
                      { label: 'Websites',    value: 'websites'   },
                      { label: 'Branding',    value: 'branding'   },
                      { label: 'Graphics',    value: 'graphics'   },
                      { label: 'Business',    value: 'business'   },
                      { label: 'Marketing',   value: 'marketing'  }
                    ]
                  },
                  { label: 'Badge (optional)',             name: 'badge',       widget: 'string',  required: false, hint: 'e.g. 🛒 E-commerce — leave blank for none' },
                  { label: 'Short Description',           name: 'description', widget: 'text'   },
                  { label: 'Price',                       name: 'price',       widget: 'string',  hint: 'e.g. From ZMW 980' },
                  { label: 'Main Image URL',              name: 'image',       widget: 'string',  hint: 'Paste an image URL or upload via Media' },
                  {
                    label: 'Features List', name: 'features', widget: 'list',
                    hint: 'Each line is one bullet point shown in the modal',
                    field: { label: 'Feature', name: 'feature', widget: 'string' }
                  },
                  {
                    label: 'Gallery Images (optional)', name: 'gallery', widget: 'list',
                    required: false,
                    field: { label: 'Image URL', name: 'url', widget: 'string' }
                  }
                ]
              }
            ]
          }
        ]
      },

      // ════════════════════════════════════════════════
      // COLLECTION 3 — PORTFOLIO
      // Edits: portfolio[] array
      // ════════════════════════════════════════════════
      {
        name: 'portfolio',
        label: '📂 Portfolio & Case Studies',
        files: [
          {
            name: 'portfolio_list',
            label: 'All Case Studies',
            file: 'data.json',
            fields: [
              {
                label: 'Portfolio', name: 'portfolio', widget: 'list',
                hint: 'Each item is a client case study shown in the Portfolio section',
                fields: [
                  { label: 'ID (e.g. p1, p2…)',          name: 'id',          widget: 'string' },
                  { label: 'Project / Client Name',       name: 'title',       widget: 'string' },
                  {
                    label: 'Category', name: 'category', widget: 'select',
                    options: [
                      { label: 'E-commerce', value: 'ecommerce' },
                      { label: 'Websites',   value: 'websites'  },
                      { label: 'Branding',   value: 'branding'  },
                      { label: 'Graphics',   value: 'graphics'  },
                      { label: 'Business',   value: 'business'  },
                      { label: 'Marketing',  value: 'marketing' }
                    ]
                  },
                  { label: 'Short Description (card)',    name: 'description', widget: 'text'   },
                  { label: 'Full Story (modal)',          name: 'detail',      widget: 'text'   },
                  { label: 'Main Image URL',              name: 'image',       widget: 'string' },
                  { label: 'Before Image URL (optional)', name: 'before',      widget: 'string', required: false },
                  { label: 'After Image URL (optional)',  name: 'after',       widget: 'string', required: false },
                  { label: 'Live Site URL (use # if none)', name: 'live_url',  widget: 'string' },
                  {
                    label: 'Tags', name: 'tags', widget: 'list',
                    field: { label: 'Tag', name: 'tag', widget: 'string' }
                  },
                  {
                    label: 'Results / Stats', name: 'stats', widget: 'object',
                    fields: [
                      { label: 'Growth (e.g. 300%)',           name: 'growth', widget: 'string' },
                      { label: 'Time (e.g. 2 months)',         name: 'time',   widget: 'string' },
                      { label: 'Reach (e.g. Nationwide)',      name: 'reach',  widget: 'string' }
                    ]
                  }
                ]
              }
            ]
          }
        ]
      },

      // ════════════════════════════════════════════════
      // COLLECTION 4 — TESTIMONIALS
      // Edits: testimonials[] array
      // ════════════════════════════════════════════════
      {
        name: 'testimonials',
        label: '⭐ Testimonials',
        files: [
          {
            name: 'testimonials_list',
            label: 'Client Testimonials',
            file: 'data.json',
            fields: [
              {
                label: 'Testimonials', name: 'testimonials', widget: 'list',
                fields: [
                  { label: 'Client Name',         name: 'name',   widget: 'string' },
                  { label: 'Role & Business',     name: 'role',   widget: 'string', hint: 'e.g. Restaurant Owner, Kitwe' },
                  { label: 'Photo URL',           name: 'avatar', widget: 'string' },
                  { label: 'Star Rating (1 – 5)', name: 'rating', widget: 'number', value_type: 'int', min: 1, max: 5, default: 5 },
                  { label: 'Testimonial Text',    name: 'text',   widget: 'text'   }
                ]
              }
            ]
          }
        ]
      },

      // ════════════════════════════════════════════════
      // COLLECTION 5 — TEAM
      // Edits: team[] array
      // ════════════════════════════════════════════════
      {
        name: 'team',
        label: '👥 Team Members',
        files: [
          {
            name: 'team_list',
            label: 'Team Members',
            file: 'data.json',
            fields: [
              {
                label: 'Team', name: 'team', widget: 'list',
                fields: [
                  { label: 'Full Name',        name: 'name',   widget: 'string' },
                  { label: 'Job Title / Role', name: 'role',   widget: 'string' },
                  { label: 'Photo URL',        name: 'avatar', widget: 'string' },
                  { label: 'Bio',              name: 'bio',    widget: 'text'   },
                  { label: 'Personal Quote',   name: 'quote',  widget: 'string' },
                  {
                    label: 'Skills / Expertise', name: 'skills', widget: 'list',
                    field: { label: 'Skill', name: 'skill', widget: 'string' }
                  }
                ]
              }
            ]
          }
        ]
      },

      // ════════════════════════════════════════════════
      // COLLECTION 6 — FAQ
      // Edits: faqs[] array
      // ════════════════════════════════════════════════
      {
        name: 'faq',
        label: '❓ FAQ',
        files: [
          {
            name: 'faq_list',
            label: 'Frequently Asked Questions',
            file: 'data.json',
            fields: [
              {
                label: 'FAQs', name: 'faqs', widget: 'list',
                fields: [
                  { label: 'Question', name: 'q', widget: 'string' },
                  { label: 'Answer',   name: 'a', widget: 'text'   }
                ]
              }
            ]
          }
        ]
      },

      // ════════════════════════════════════════════════
      // COLLECTION 7 — PROCESS STEPS
      // Edits: process_steps[] array
      // ════════════════════════════════════════════════
      {
        name: 'process',
        label: '🔄 How We Work',
        files: [
          {
            name: 'process_list',
            label: 'Process Steps',
            file: 'data.json',
            fields: [
              {
                label: 'Process Steps', name: 'process_steps', widget: 'list',
                hint: 'The 5 steps shown in the "How We Work" section',
                fields: [
                  { label: 'Step Number (e.g. 01)', name: 'number', widget: 'string' },
                  { label: 'Step Title',            name: 'title',  widget: 'string' },
                  { label: 'Description',           name: 'desc',   widget: 'text'   }
                ]
              }
            ]
          }
        ]
      },

      // ════════════════════════════════════════════════
      // COLLECTION 8 — FREE TOOLS
      // Edits: tools[] array
      // ════════════════════════════════════════════════
      {
        name: 'free_tools',
        label: '🔧 Free Tools',
        files: [
          {
            name: 'tools_list',
            label: 'All Free Tools',
            file: 'data.json',
            fields: [
              {
                label: 'Tools', name: 'tools', widget: 'list',
                hint: 'Each tool appears in the tools hub. ID must match the folder name in /tools/',
                fields: [
                  { label: 'Tool ID (matches folder name)', name: 'id',       widget: 'string', hint: 'e.g. invoice — must match /tools/invoice/ folder' },
                  { label: 'Tool Name',                     name: 'title',    widget: 'string' },
                  { label: 'Short Description',             name: 'desc',     widget: 'text'   },
                  { label: 'Icon (emoji)',                   name: 'icon',     widget: 'string', hint: 'e.g. 🧾' },
                  {
                    label: 'Category', name: 'category', widget: 'select',
                    options: [
                      { label: 'Write Better',    value: 'write'       },
                      { label: 'Calculate',       value: 'calculate'   },
                      { label: 'Documents',       value: 'documents'   },
                      { label: 'Research & Text', value: 'research'    },
                      { label: 'Developer Tools', value: 'developer'   },
                      { label: 'Productivity',    value: 'productivity' },
                      { label: 'Zambia Specific', value: 'zambia'      }
                    ]
                  },
                  { label: 'URL Path', name: 'url', widget: 'string', hint: 'e.g. tools/invoice/index.html' }
                ]
              }
            ]
          }
        ]
      },

      // ════════════════════════════════════════════════
      // COLLECTION 9 — BLOG POSTS
      // Creates files in: content/blog/
      // ════════════════════════════════════════════════
      {
        name: 'blog',
        label: '📝 Blog Posts',
        label_singular: 'Blog Post',
        folder: 'content/blog',
        create: true,
        slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
        fields: [
          { label: 'Title',           name: 'title',     widget: 'string'   },
          { label: 'Publish Date',    name: 'date',      widget: 'datetime' },
          { label: 'Featured Image URL', name: 'image',  widget: 'string',  required: false },
          { label: 'Excerpt / Summary',  name: 'excerpt', widget: 'text',   required: false },
          {
            label: 'Category', name: 'category', widget: 'select', required: false,
            options: ['Business Tips','E-commerce','Digital Marketing','Zambia Tech','Case Study','Announcements']
          },
          { label: 'Author',          name: 'author',    widget: 'string',  default: 'BLESSTech-X' },
          { label: 'Published',       name: 'published', widget: 'boolean', default: true },
          { label: 'Body',            name: 'body',      widget: 'markdown' }
        ]
      }

    ]
  }
});
</script>

</body>
</html>

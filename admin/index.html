<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLESSTech-X Admin</title>
  <link rel="icon" type="image/jpeg" href="https://i.ibb.co/zTWvRVB1/Copilot-20251230-144351.jpg" />
  <style>
    body { margin: 0; font-family: sans-serif; background: #0f172a; }
  </style>
</head>
<body>

<script>
  window.CMS_MANUAL_INIT = true;
</script>
<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

<script>
CMS.init({
  config: {
    backend: {
      name: 'github',
      repo: 'BLESSTech-X/.com',
      branch: 'main',
      base_url: 'https://api.netlify.com',
      auth_endpoint: 'auth'
    },
    media_folder: 'images/uploads',
    public_folder: '/images/uploads',
    slug: { encoding: 'ascii', clean_accents: true },

    collections: [

      // ════════════════════════════════════════════════════════
      // 1. HOMEPAGE
      // ════════════════════════════════════════════════════════
      {
        name: 'homepage',
        label: '🏠 Home Page',
        files: [
          {
            name: 'hero',
            label: 'Hero Section',
            file: 'data.json',
            fields: [
              {
                label: 'Hero', name: 'hero', widget: 'object',
                fields: [
                  { label: 'Badge Text (e.g. Trusted by 150+ Zambian Businesses)', name: 'badge',       widget: 'string' },
                  { label: 'Main Headline',                                         name: 'headline',    widget: 'string' },
                  { label: 'Sub Headline',                                          name: 'subheadline', widget: 'string' },
                  { label: 'Description',                                           name: 'description', widget: 'text'   },
                  { label: 'Primary Button Text',                                   name: 'btn_primary', widget: 'string' },
                  { label: 'Primary Button Link',                                   name: 'btn_primary_link', widget: 'string' },
                  { label: 'WhatsApp Button Text',                                  name: 'btn_whatsapp', widget: 'string' },
                  { label: 'Background Image URL',                                  name: 'bg_image',    widget: 'string' },
                  {
                    label: 'Trust Pills', name: 'trust_pills', widget: 'list',
                    fields: [
                      { label: 'Icon (Font Awesome class, e.g. fas fa-bolt)', name: 'icon', widget: 'string' },
                      { label: 'Text', name: 'text', widget: 'string' }
                    ]
                  }
                ]
              }
            ]
          },
          {
            name: 'stats',
            label: 'Stats Bar',
            file: 'data.json',
            fields: [
              {
                label: 'Stats', name: 'stats', widget: 'list',
                fields: [
                  { label: 'Value (e.g. 150+)', name: 'value', widget: 'string' },
                  { label: 'Label',             name: 'label', widget: 'string' }
                ]
              }
            ]
          },
          {
            name: 'announcement',
            label: 'Announcement Bar',
            file: 'data.json',
            fields: [
              {
                label: 'Announcement', name: 'announcement', widget: 'object',
                fields: [
                  { label: 'Show Bar',    name: 'active',   widget: 'boolean', default: true },
                  { label: 'Message (HTML allowed, e.g. <strong>30% OFF</strong>)', name: 'message',  widget: 'string' },
                  { label: 'Button Text', name: 'cta_text', widget: 'string' },
                  { label: 'Button Link', name: 'cta_link', widget: 'string' }
                ]
              }
            ]
          }
        ]
      },

      // ════════════════════════════════════════════════════════
      // 2. SITE SETTINGS & CONTACT
      // ════════════════════════════════════════════════════════
      {
        name: 'site_config',
        label: '⚙️ Site Settings & Contact',
        files: [
          {
            name: 'site_info',
            label: 'General Info',
            file: 'data.json',
            fields: [
              {
                label: 'Site', name: 'site', widget: 'object',
                fields: [
                  { label: 'Site Name',       name: 'name',         widget: 'string' },
                  { label: 'Tagline',         name: 'tagline',      widget: 'string' },
                  { label: 'Description',     name: 'description',  widget: 'text'   },
                  { label: 'Phone',           name: 'phone',        widget: 'string' },
                  { label: 'Email',           name: 'email',        widget: 'string' },
                  { label: 'WhatsApp (digits only, no +)', name: 'whatsapp', widget: 'string' },
                  { label: 'Location',        name: 'location',     widget: 'string' },
                  { label: 'Formspree ID',    name: 'formspree_id', widget: 'string', hint: 'Get this from formspree.io' },
                  { label: 'Logo URL',        name: 'logo',         widget: 'string' },
                  { label: 'OG / Share Image URL', name: 'og_image', widget: 'string' },
                  {
                    label: 'Social Media Links', name: 'socials', widget: 'object',
                    fields: [
                      { label: 'Facebook URL',  name: 'facebook',  widget: 'string', required: false },
                      { label: 'Instagram URL', name: 'instagram', widget: 'string', required: false },
                      { label: 'TikTok URL',    name: 'tiktok',    widget: 'string', required: false },
                      { label: 'Twitter/X URL', name: 'twitter',   widget: 'string', required: false },
                      { label: 'YouTube URL',   name: 'youtube',   widget: 'string', required: false }
                    ]
                  }
                ]
              }
            ]
          },
          {
            name: 'footer',
            label: 'Footer',
            file: 'data.json',
            fields: [
              {
                label: 'Footer', name: 'footer', widget: 'object',
                fields: [
                  { label: 'About Text', name: 'about_text', widget: 'text' },
                  { label: 'Copyright Text', name: 'copyright', widget: 'string' },
                  {
                    label: 'Popular Tools Links', name: 'tool_links', widget: 'list',
                    fields: [
                      { label: 'Tool Name', name: 'name', widget: 'string' },
                      { label: 'URL',       name: 'url',  widget: 'string' }
                    ]
                  }
                ]
              }
            ]
          }
        ]
      },

      // ════════════════════════════════════════════════════════
      // 3. SERVICES
      // ════════════════════════════════════════════════════════
      {
        name: 'services',
        label: '🛠️ Services',
        files: [
          {
            name: 'services_list',
            label: 'All Services',
            file: 'data.json',
            fields: [
              {
                label: 'Services', name: 'services', widget: 'list',
                fields: [
                  { label: 'ID (unique, no spaces, e.g. ecommerce-store)', name: 'id', widget: 'string' },
                  { label: 'Title',   name: 'title',       widget: 'string' },
                  { label: 'Display Order (1 = first)', name: 'order', widget: 'number', required: false },
                  {
                    label: 'Category', name: 'category', widget: 'select',
                    options: ['ecommerce','websites','branding','graphics','business','marketing']
                  },
                  { label: 'Badge (optional, e.g. 🛒 E-commerce)', name: 'badge', widget: 'string', required: false },
                  { label: 'Short Description', name: 'description', widget: 'text' },
                  { label: 'Price (e.g. From ZMW 980)', name: 'price', widget: 'string' },
                  { label: 'Icon (Font Awesome class, e.g. fas fa-store)', name: 'icon', widget: 'string', required: false },
                  { label: 'Main Image URL', name: 'image', widget: 'image' },
                  {
                    label: 'Features List', name: 'features', widget: 'list',
                    field: { label: 'Feature', name: 'feature', widget: 'string' }
                  },
                  {
                    label: 'Gallery Images', name: 'gallery', widget: 'list',
                    field: { label: 'Image URL', name: 'url', widget: 'image' }
                  }
                ]
              }
            ]
          }
        ]
      },

      // ════════════════════════════════════════════════════════
      // 4. PORTFOLIO / CASE STUDIES
      // ════════════════════════════════════════════════════════
      {
        name: 'portfolio',
        label: '📂 Portfolio & Case Studies',
        files: [
          {
            name: 'portfolio_list',
            label: 'All Case Studies',
            file: 'data.json',
            fields: [
              {
                label: 'Portfolio', name: 'portfolio', widget: 'list',
                fields: [
                  { label: 'ID (e.g. p1)',         name: 'id',          widget: 'string' },
                  { label: 'Project / Client Name', name: 'title',       widget: 'string' },
                  { label: 'Business Type',         name: 'business_type', widget: 'string', required: false },
                  { label: 'Client Location',       name: 'location',    widget: 'string', required: false },
                  {
                    label: 'Category', name: 'category', widget: 'select',
                    options: ['ecommerce','websites','branding','graphics','business','marketing']
                  },
                  { label: 'Short Description',    name: 'description',  widget: 'text'   },
                  { label: 'Full Story / Detail',  name: 'detail',       widget: 'text'   },
                  { label: 'Main Image',           name: 'image',        widget: 'image'  },
                  { label: 'Before Image',         name: 'before',       widget: 'image',  required: false },
                  { label: 'After Image',          name: 'after',        widget: 'image',  required: false },
                  { label: 'Live Site URL (use # if none)', name: 'live_url', widget: 'string' },
                  {
                    label: 'Tags', name: 'tags', widget: 'list',
                    field: { label: 'Tag', name: 'tag', widget: 'string' }
                  },
                  {
                    label: 'Results / Stats', name: 'stats', widget: 'object',
                    fields: [
                      { label: 'Growth (e.g. 300%)',      name: 'growth', widget: 'string' },
                      { label: 'Timeframe (e.g. 2 months)', name: 'time', widget: 'string' },
                      { label: 'Market Reach (e.g. Nationwide)', name: 'reach', widget: 'string' }
                    ]
                  }
                ]
              }
            ]
          }
        ]
      },

      // ════════════════════════════════════════════════════════
      // 5. TESTIMONIALS
      // ════════════════════════════════════════════════════════
      {
        name: 'testimonials',
        label: '⭐ Testimonials',
        files: [
          {
            name: 'testimonials_list',
            label: 'Client Testimonials',
            file: 'data.json',
            fields: [
              {
                label: 'Testimonials', name: 'testimonials', widget: 'list',
                fields: [
                  { label: 'Client Name',     name: 'name',   widget: 'string' },
                  { label: 'Role / Business', name: 'role',   widget: 'string' },
                  { label: 'Client Photo',    name: 'avatar', widget: 'image'  },
                  { label: 'Star Rating (1–5)', name: 'rating', widget: 'number', value_type: 'int', min: 1, max: 5, default: 5 },
                  { label: 'Testimonial Text', name: 'text',  widget: 'text'   }
                ]
              }
            ]
          }
        ]
      },

      // ════════════════════════════════════════════════════════
      // 6. TEAM
      // ════════════════════════════════════════════════════════
      {
        name: 'team',
        label: '👥 Team',
        files: [
          {
            name: 'team_list',
            label: 'Team Members',
            file: 'data.json',
            fields: [
              {
                label: 'Team', name: 'team', widget: 'list',
                fields: [
                  { label: 'Full Name',  name: 'name',   widget: 'string' },
                  { label: 'Job Title', name: 'role',   widget: 'string' },
                  { label: 'Photo',     name: 'avatar', widget: 'image'  },
                  { label: 'Bio',       name: 'bio',    widget: 'text'   },
                  { label: 'Personal Quote', name: 'quote', widget: 'string' },
                  {
                    label: 'Skills / Expertise', name: 'skills', widget: 'list',
                    field: { label: 'Skill', name: 'skill', widget: 'string' }
                  }
                ]
              }
            ]
          }
        ]
      },

      // ════════════════════════════════════════════════════════
      // 7. FAQ
      // ════════════════════════════════════════════════════════
      {
        name: 'faq',
        label: '❓ FAQ',
        files: [
          {
            name: 'faq_list',
            label: 'Frequently Asked Questions',
            file: 'data.json',
            fields: [
              {
                label: 'FAQs', name: 'faqs', widget: 'list',
                fields: [
                  { label: 'Question', name: 'q', widget: 'string' },
                  { label: 'Answer',   name: 'a', widget: 'text'   }
                ]
              }
            ]
          }
        ]
      },

      // ════════════════════════════════════════════════════════
      // 8. HOW WE WORK (PROCESS STEPS)
      // ════════════════════════════════════════════════════════
      {
        name: 'process',
        label: '🔄 How We Work',
        files: [
          {
            name: 'process_list',
            label: 'Process Steps',
            file: 'data.json',
            fields: [
              {
                label: 'Process Steps', name: 'process_steps', widget: 'list',
                fields: [
                  { label: 'Step Number (e.g. 01)', name: 'number', widget: 'string' },
                  { label: 'Step Title',            name: 'title',  widget: 'string' },
                  { label: 'Description',           name: 'desc',   widget: 'text'   }
                ]
              }
            ]
          }
        ]
      },

      // ════════════════════════════════════════════════════════
      // 9. FREE TOOLS SECTION
      // ════════════════════════════════════════════════════════
      {
        name: 'free_tools',
        label: '🔧 Free Tools',
        files: [
          {
            name: 'tools_list',
            label: 'All Free Tools',
            file: 'data.json',
            fields: [
              {
                label: 'Free Tools', name: 'free_tools', widget: 'list',
                fields: [
                  { label: 'Tool Name',    name: 'name',        widget: 'string' },
                  { label: 'Description', name: 'description', widget: 'text'   },
                  { label: 'URL / Link',  name: 'url',         widget: 'string' },
                  { label: 'Icon (Font Awesome class, e.g. fas fa-file-invoice)', name: 'icon', widget: 'string' },
                  {
                    label: 'Category', name: 'category', widget: 'select',
                    options: ['business','finance','marketing','productivity','design','education','other']
                  },
                  { label: 'Show on Homepage', name: 'featured', widget: 'boolean', default: false }
                ]
              }
            ]
          }
        ]
      },

      // ════════════════════════════════════════════════════════
      // 10. BLOG POSTS
      // ════════════════════════════════════════════════════════
      {
        name: 'blog',
        label: '📝 Blog',
        label_singular: 'Blog Post',
        folder: 'content/blog',
        create: true,
        slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
        preview_path: 'blog/{{slug}}',
        fields: [
          { label: 'Title',          name: 'title',        widget: 'string'   },
          { label: 'Publish Date',   name: 'date',         widget: 'datetime' },
          { label: 'Featured Image', name: 'image',        widget: 'image',   required: false },
          { label: 'Excerpt / Summary', name: 'excerpt',   widget: 'text',    required: false },
          {
            label: 'Category', name: 'category', widget: 'select', required: false,
            options: ['Business Tips','E-commerce','Digital Marketing','Zambia Tech','Case Study','Announcements']
          },
          { label: 'Author',         name: 'author',       widget: 'string',  default: 'BLESSTech-X', required: false },
          { label: 'Published',      name: 'published',    widget: 'boolean', default: true },
          { label: 'Body',           name: 'body',         widget: 'markdown' }
        ]
      }

    ]
  }
});
</script>

</body>
</html>
